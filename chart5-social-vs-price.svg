<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <rect fill="#0a0a0f" width="800" height="350" rx="12"/>
  <text x="400" y="35" fill="#fff" font-size="22" font-weight="bold" text-anchor="middle" font-family="Inter,sans-serif">Social Media Mentions vs RAVE Price</text>
  <text x="400" y="60" fill="#8888a0" font-size="13" text-anchor="middle" font-family="Inter,sans-serif">5x spike in mentions correlates with 229% daily price surge</text>
  <!-- Axes -->
  <line x1="100" y1="80" x2="100" y2="290" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="100" y1="290" x2="720" y2="290" stroke="#2a2a3e" stroke-width="1"/>
  <!-- Mentions bars -->
  <rect x="140" y="250" width="60" height="40" fill="#0f3460" rx="4"/>
  <text x="170" y="245" fill="#0f3460" font-size="11" text-anchor="middle" font-family="Inter,sans-serif">1x</text>

  <rect x="240" y="240" width="60" height="50" fill="#0f3460" rx="4"/>
  <text x="270" y="235" fill="#0f3460" font-size="11" text-anchor="middle" font-family="Inter,sans-serif">1.3x</text>

  <rect x="340" y="230" width="60" height="60" fill="#0f3460" rx="4"/>
  <text x="370" y="225" fill="#0f3460" font-size="11" text-anchor="middle" font-family="Inter,sans-serif">1.5x</text>

  <rect x="440" y="200" width="60" height="90" fill="#ff6d00" rx="4"/>
  <text x="470" y="195" fill="#ff6d00" font-size="11" text-anchor="middle" font-family="Inter,sans-serif">2.5x</text>

  <rect x="540" y="130" width="60" height="160" fill="#ffd600" rx="4"/>
  <text x="570" y="125" fill="#ffd600" font-size="11" text-anchor="middle" font-family="Inter,sans-serif">3.5x</text>

  <rect x="640" y="90" width="60" height="200" fill="#e94560" rx="4"/>
  <text x="670" y="85" fill="#e94560" font-size="12" font-weight="bold" text-anchor="middle" font-family="Inter,sans-serif">5x 🔥</text>
  <!-- Date labels -->
  <text x="170" y="308" fill="#8888a0" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">Apr 8</text>
  <text x="270" y="308" fill="#8888a0" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">Apr 9</text>
  <text x="370" y="308" fill="#8888a0" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">Apr 10</text>
  <text x="470" y="308" fill="#8888a0" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">Apr 11</text>
  <text x="570" y="308" fill="#8888a0" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">Apr 12</text>
  <text x="670" y="308" fill="#e94560" font-size="10" font-weight="bold" text-anchor="middle" font-family="Inter,sans-serif">Apr 13</text>
  <!-- Price line overlay -->
  <polyline points="170,280 270,275 370,260 470,220 570,170 670,95" fill="none" stroke="#00c853" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="690" y="92" fill="#00c853" font-size="10" text-anchor="end" font-family="Inter,sans-serif">Price</text>
  <!-- Annotation -->
  <rect x="200" y="100" width="160" height="50" fill="#1a1a2e" stroke="#ffd600" stroke-width="1" rx="6"/>
  <text x="280" y="120" fill="#ffd600" font-size="12" font-weight="bold" text-anchor="middle" font-family="Inter,sans-serif">Social mentions ↑ 5x</text>
  <text x="280" y="138" fill="#e94560" font-size="12" font-weight="bold" text-anchor="middle" font-family="Inter,sans-serif">Price ↑ 229%</text>
  <!-- Source -->
  <text x="400" y="340" fill="#555" font-size="10" text-anchor="middle" font-family="Inter,sans-serif">Source: YouTube analytics, CoinMarketCap social data — April 13, 2026</text>
